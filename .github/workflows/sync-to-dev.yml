name: Approved Sync akrahealth-latest → new-app-akrahealth

on:
  workflow_dispatch:   # Manual trigger only

jobs:
  sync:
    runs-on: ubuntu-latest

    environment:
      name: dev-sync-approval   # Approval REQUIRED

    steps:
      # Step 1: Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Step 2: Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DESTINATION_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Step 3: Configure Git
      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # Step 4: Force push main → dev
      - name: Force Push main → dev
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
          git push --force git@github.com:akratech-com/new-app-akrahealth.git main:dev
